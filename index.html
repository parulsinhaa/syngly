<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>Syngly</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet"/>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  --ink:#0A0A0F;
  --ink2:#1C1C28;
  --ink3:#2E2E3E;
  --muted:#8888A0;
  --faint:#DDDDEE;
  --white:#FAFAFA;
  --a:#7B5CFF;
  --a2:#9B7FFF;
  --a3:#C4B5FF;
  --a-glow:rgba(123,92,255,.35);
  --pink:#FF5CAA;
  --teal:#00E5CC;
  --gold:#FFD166;
  --r:16px; --r-sm:10px; --r-xs:7px; --r-full:9999px;
  --font:'Space Grotesk',system-ui,sans-serif;
  --font-d:'Playfair Display',Georgia,serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;background:var(--ink)}
body{font-family:var(--font);color:var(--white);font-size:14px}
button,input{font-family:var(--font);border:none;outline:none;background:none;cursor:pointer;color:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:3px}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SCREENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .5s var(--ease),transform .5s var(--ease)}
.screen.off{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LANDING — AURORA BG
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#land{align-items:center;justify-content:center;padding:24px;overflow:hidden}

.aurora{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.au{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen;animation:auDrift 15s ease-in-out infinite}
.au1{width:70vw;height:70vw;background:radial-gradient(circle,#7B5CFF44,transparent 65%);top:-20%;left:-15%;animation-duration:18s}
.au2{width:60vw;height:60vw;background:radial-gradient(circle,#FF5CAA33,transparent 65%);bottom:-20%;right:-15%;animation-duration:14s;animation-delay:-5s}
.au3{width:50vw;height:50vw;background:radial-gradient(circle,#00E5CC28,transparent 65%);top:30%;right:20%;animation-duration:11s;animation-delay:-9s}
@keyframes auDrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(4%,-5%) scale(1.06)}66%{transform:translate(-5%,3%) scale(.96)}}

.land-wrap{position:relative;z-index:1;width:100%;max-width:430px}

/* Wordmark */
.wordmark{text-align:center;margin-bottom:44px}
.wm-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--a),var(--pink));border-radius:18px;display:grid;place-items:center;margin:0 auto 14px;box-shadow:0 0 40px var(--a-glow);animation:iconPop .7s var(--spring) both}
@keyframes iconPop{from{opacity:0;transform:scale(.5) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0deg)}}
.wm-icon svg{width:28px;height:28px;fill:white}
.wm-name{font-family:var(--font-d);font-style:italic;font-size:42px;font-weight:700;background:linear-gradient(135deg,#fff 30%,var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .6s var(--ease) .15s both}
.wm-tag{color:var(--muted);font-size:14px;font-weight:400;margin-top:6px;letter-spacing:.03em;animation:fadeUp .6s var(--ease) .25s both}

/* Card */
.lcard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:28px;backdrop-filter:blur(24px);animation:fadeUp .6s var(--ease) .3s both;box-shadow:0 24px 80px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12)}

/* Tabs */
.ltabs{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:var(--r-full);padding:4px;margin-bottom:24px}
.ltab{flex:1;padding:10px;border-radius:var(--r-full);font-size:13px;font-weight:600;color:var(--muted);transition:all .25s var(--ease)}
.ltab.on{background:linear-gradient(135deg,var(--a),var(--a2));color:white;box-shadow:0 4px 16px var(--a-glow)}

/* Fields */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.fi{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:13px 15px;font-size:14px;font-weight:500;color:var(--white);transition:all .2s var(--ease)}
.fi:focus{border-color:var(--a);background:rgba(123,92,255,.12);box-shadow:0 0 0 3px rgba(123,92,255,.18)}
.fi::placeholder{color:rgba(255,255,255,.25);font-weight:400}
.fi.code{text-transform:uppercase;letter-spacing:.25em;font-size:18px;font-weight:700;text-align:center}

/* CTA */
.cta{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:15px;background:linear-gradient(135deg,var(--a),var(--pink));border-radius:var(--r-sm);font-size:15px;font-weight:700;color:white;letter-spacing:.01em;transition:all .2s var(--ease);position:relative;overflow:hidden;margin-top:4px}
.cta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0),rgba(255,255,255,.12));opacity:0;transition:.2s}
.cta:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(123,92,255,.45)}
.cta:hover::before{opacity:1}
.cta:active{transform:translateY(0)}
.cta svg{width:18px;height:18px;fill:white;flex-shrink:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROOM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#room{flex-direction:row}

/* Dynamic bg from album art */
.room-bg{position:fixed;inset:0;background:var(--ink);transition:background 2s ease;pointer-events:none;z-index:0}
.room-bg::after{content:'';position:absolute;inset:0;background:rgba(10,10,15,.82)}

/* ── SIDEBAR ── */
.sidebar{position:relative;z-index:2;width:310px;min-width:310px;height:100%;display:flex;flex-direction:column;background:rgba(10,10,15,.7);border-right:1px solid rgba(255,255,255,.08);backdrop-filter:blur(30px)}

/* Header */
.sb-head{padding:14px 14px 0;flex-shrink:0}
.sb-top{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{width:36px;height:36px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-sm);display:grid;place-items:center;flex-shrink:0;transition:all .2s var(--ease)}
.back-btn:hover{background:rgba(255,255,255,.12)}
.back-btn svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.room-nm{font-family:var(--font-d);font-style:italic;font-size:17px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.code-chip{display:flex;align-items:center;gap:5px;background:rgba(123,92,255,.15);border:1.5px solid rgba(123,92,255,.35);border-radius:var(--r-full);padding:5px 12px;cursor:pointer;transition:all .2s var(--ease);flex-shrink:0}
.code-chip:hover{background:var(--a);border-color:var(--a)}
.code-dot{width:5px;height:5px;background:#00E5CC;border-radius:50%;animation:blink 2s ease infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.code-txt{font-size:12px;font-weight:700;color:var(--a3);letter-spacing:.06em}
.code-chip:hover .code-txt{color:white}

/* Search */
.search-box{position:relative;margin-bottom:10px}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none}
.s-icon svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.s-in{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-sm);padding:10px 36px 10px 34px;font-size:13px;font-weight:500;color:var(--white);transition:all .2s var(--ease)}
.s-in:focus{border-color:var(--a);background:rgba(123,92,255,.1);box-shadow:0 0 0 3px rgba(123,92,255,.15)}
.s-in::placeholder{color:rgba(255,255,255,.25);font-weight:400}
.s-clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:20px;height:20px;background:rgba(255,255,255,.1);border-radius:50%;display:none;place-items:center;cursor:pointer;transition:.15s}
.s-clr:hover{background:rgba(255,255,255,.2)}
.s-clr svg{width:10px;height:10px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.has-q .s-clr{display:grid}

/* Search results */
.s-results{background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);backdrop-filter:blur(20px);overflow:hidden;max-height:0;overflow-y:auto;transition:max-height .35s var(--ease);box-shadow:0 20px 60px rgba(0,0,0,.5)}
.s-results.open{max-height:340px}
.sr{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.05);animation:slideIn .2s var(--ease) both}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.sr:last-child{border-bottom:none}
.sr:hover{background:rgba(255,255,255,.06)}
.sr-img{width:50px;height:36px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,.07);flex-shrink:0}
.sr-info{flex:1;min-width:0}
.sr-t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-c{font-size:11px;color:var(--muted);margin-top:2px}
.sr-add{width:28px;height:28px;background:rgba(123,92,255,.2);border:1px solid rgba(123,92,255,.4);border-radius:var(--r-sm);display:grid;place-items:center;flex-shrink:0;transition:all .2s var(--ease)}
.sr:hover .sr-add{background:var(--a);border-color:var(--a);transform:scale(1.1)}
.sr-add svg{width:13px;height:13px;fill:var(--a3)}
.sr:hover .sr-add svg{fill:white}
.s-spin{padding:18px;display:flex;justify-content:center}
.spinner{width:22px;height:22px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--a);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.s-empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}

/* Sidebar tabs */
.stabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;margin-top:10px}
.stab{flex:1;padding:10px 6px;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s var(--ease)}
.stab.on{color:var(--a2);border-bottom-color:var(--a)}
.stab:hover:not(.on){color:rgba(255,255,255,.6)}

/* Panes */
.spane{flex:1;overflow-y:auto;display:none;flex-direction:column}
.spane.on{display:flex}

/* Queue items */
.qi{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden;animation:fadeIn .3s var(--ease) both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.qi::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--a),var(--pink));transform:scaleY(0);transition:.25s var(--spring);border-radius:0 2px 2px 0}
.qi.now::before{transform:scaleY(1)}
.qi:hover:not(.now){background:rgba(255,255,255,.04)}
.qi.now{background:rgba(123,92,255,.12)}
.qi-thumb{width:44px;height:32px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,.07);flex-shrink:0}
.qi-info{flex:1;min-width:0}
.qi-t{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi.now .qi-t{color:var(--a3)}
.qi-c{font-size:11px;color:var(--muted);margin-top:2px}
.eq{display:flex;align-items:flex-end;gap:2px;height:14px;flex-shrink:0}
.eq-b{width:3px;border-radius:2px;background:var(--a)}
.eq-b:nth-child(1){animation:eqA .7s ease infinite alternate}
.eq-b:nth-child(2){animation:eqA .5s ease infinite alternate;animation-delay:.12s}
.eq-b:nth-child(3){animation:eqA .85s ease infinite alternate;animation-delay:.24s}
@keyframes eqA{from{height:3px}to{height:14px}}
.q-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:10px;color:var(--muted);text-align:center;flex:1}
.q-empty-icon{font-size:36px;margin-bottom:4px;opacity:.5}
.q-empty p{font-size:13px;line-height:1.6}

/* Chat */
.chat-feed{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.cmsg{animation:fadeIn .25s var(--ease)}
.cm-meta{display:flex;align-items:baseline;gap:6px;margin-bottom:3px}
.cm-name{font-size:11px;font-weight:700;color:var(--a3)}
.cm-name.me{color:var(--pink)}
.cm-time{font-size:10px;color:var(--muted)}
.cm-bubble{display:inline-block;background:rgba(255,255,255,.07);border-radius:10px 10px 10px 3px;padding:8px 12px;font-size:13px;color:rgba(255,255,255,.8);line-height:1.45;max-width:90%}
.cmsg.me .cm-bubble{background:rgba(123,92,255,.2);border:1px solid rgba(123,92,255,.25);color:white;border-radius:10px 10px 3px 10px}
.sys-msg{text-align:center;font-size:11px;color:var(--muted);font-style:italic;padding:4px 0}
.chat-bar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);flex-shrink:0}
.cin{flex:1;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:var(--r-full);padding:9px 14px;font-size:13px;color:white;transition:all .2s var(--ease)}
.cin:focus{border-color:var(--a)}
.cin::placeholder{color:rgba(255,255,255,.25)}
.csend{width:36px;height:36px;background:linear-gradient(135deg,var(--a),var(--pink));border-radius:50%;display:grid;place-items:center;flex-shrink:0;transition:all .2s var(--ease)}
.csend:hover{transform:scale(1.1)}
.csend svg{width:14px;height:14px;fill:white;margin-left:2px}

/* People */
.ppl-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.ppl-av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0}
.ppl-nm{flex:1;font-size:13px;font-weight:600}
.ppl-host{font-size:10px;font-weight:700;color:var(--gold);background:rgba(255,209,102,.12);padding:3px 8px;border-radius:var(--r-full)}

/* ── PLAYER ── */
.player{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:24px;overflow:hidden;min-width:0}

/* Reaction bar */
.rx-bar{display:flex;gap:6px;overflow-x:auto;max-width:480px;width:100%;padding:2px 0;flex-shrink:0}
.rx-bar::-webkit-scrollbar{display:none}
.rx-b{font-size:20px;padding:8px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-full);cursor:pointer;transition:all .2s var(--ease);flex-shrink:0;line-height:1}
.rx-b:hover{background:rgba(255,255,255,.14);transform:scale(1.25) translateY(-4px);border-color:rgba(255,255,255,.25)}
.rx-b:active{transform:scale(.95)}

/* ── 3D VINYL ── */
.vinyl-stage{perspective:800px;flex-shrink:0}
.vinyl-wrap{width:min(260px,44vw);height:min(260px,44vw);position:relative;transform-style:preserve-3d;animation:vinylFloat 6s ease-in-out infinite}
@keyframes vinylFloat{0%,100%{transform:translateY(0) rotateX(4deg)}50%{transform:translateY(-12px) rotateX(4deg)}}
.vinyl-wrap.playing{animation:vinylFloat 6s ease-in-out infinite, vinylSpin 3s linear infinite}
@keyframes vinylSpin{from{transform:translateY(0) rotateX(4deg) rotateZ(0)}to{transform:translateY(0) rotateX(4deg) rotateZ(360deg)}}

/* The vinyl disc */
.vinyl{width:100%;height:100%;border-radius:50%;position:relative;background:
  radial-gradient(circle at 50% 50%, #1a1a2e 0%, #1a1a2e 20%,
    transparent 20.5%, transparent 21%,
    #0a0a15 21%, #0a0a15 21.5%,
    transparent 22%, transparent 23%,
    #111122 23%, #111122 23.5%,
    transparent 24%),
  conic-gradient(from 0deg,
    rgba(123,92,255,.15) 0deg, rgba(255,92,170,.12) 60deg,
    rgba(0,229,204,.1) 120deg, rgba(123,92,255,.15) 180deg,
    rgba(255,92,170,.12) 240deg, rgba(0,229,204,.1) 300deg,
    rgba(123,92,255,.15) 360deg),
  radial-gradient(circle, #1a1a2e 0%, #050510 100%);
box-shadow:
  0 0 0 2px rgba(255,255,255,.04),
  0 30px 80px rgba(0,0,0,.7),
  0 0 60px var(--a-glow),
  inset 0 0 30px rgba(0,0,0,.5);
overflow:hidden}

/* Groove lines */
.vinyl::before{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-radial-gradient(circle at center,transparent 0px,transparent 4px,rgba(255,255,255,.015) 4px,rgba(255,255,255,.015) 5px)}

/* Label */
.vinyl-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:38%;height:38%;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.08);box-shadow:0 0 20px rgba(0,0,0,.6)}
.vinyl-label img{width:100%;height:100%;object-fit:cover}
.vinyl-label-ph{width:100%;height:100%;background:linear-gradient(135deg,var(--a),var(--pink));display:grid;place-items:center}
.vinyl-label-ph svg{width:30px;height:30px;fill:rgba(255,255,255,.6)}

/* Center hole */
.vinyl-hole{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:4%;height:4%;background:var(--ink);border-radius:50%;z-index:2;box-shadow:0 0 4px rgba(0,0,0,.8)}

/* Tonearm */
.tonearm{position:absolute;top:-8%;right:2%;width:30%;transform-origin:top right;transition:transform 1.2s cubic-bezier(.4,0,.2,1);transform:rotate(-28deg);z-index:3}
.tonearm.playing{transform:rotate(-18deg)}
.tonearm svg{width:100%;height:auto}

/* Reflection shine */
.vinyl::after{content:'';position:absolute;inset:0;border-radius:50%;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 40%,rgba(255,255,255,.02) 100%);pointer-events:none}

/* Track info */
.track-block{text-align:center;max-width:360px;flex-shrink:0}
.t-title{font-family:var(--font-d);font-style:italic;font-size:clamp(20px,4vw,30px);font-weight:700;line-height:1.15;margin-bottom:5px;transition:all .4s var(--ease)}
.t-ch{font-size:13px;color:var(--muted);margin-bottom:12px}
.t-badges{display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:var(--r-full);font-size:11px;font-weight:700;letter-spacing:.03em}
.b-host{background:rgba(255,209,102,.12);color:var(--gold);border:1px solid rgba(255,209,102,.25)}
.b-listen{background:rgba(0,229,204,.1);color:var(--teal);border:1px solid rgba(0,229,204,.2)}
.b-sync{background:rgba(123,92,255,.12);color:var(--a3);border:1px solid rgba(123,92,255,.2)}

/* Progress */
.prog-area{width:100%;max-width:400px;flex-shrink:0}
.prog-times{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px}
.prog-rail{height:4px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;position:relative}
.prog-rail:hover .prog-thumb{opacity:1}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--a),var(--pink));border-radius:4px;transition:width .4s linear;position:relative}
.prog-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:white;border-radius:50%;box-shadow:0 0 0 3px var(--a);opacity:0;transition:.2s;cursor:grab}
.prog-thumb:active{cursor:grabbing}

/* Controls */
.ctrl-row{display:flex;align-items:center;gap:14px;flex-shrink:0}
.cb{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.07);display:grid;place-items:center;color:var(--muted);transition:all .2s var(--ease)}
.cb:hover{background:rgba(255,255,255,.13);color:white;transform:scale(1.08)}
.cb.dim{opacity:.25;pointer-events:none}
.cb svg{width:20px;height:20px;fill:currentColor}
.cb-play{width:62px;height:62px;background:linear-gradient(135deg,var(--a),var(--pink));color:white;box-shadow:0 6px 30px rgba(123,92,255,.5)}
.cb-play:hover{transform:scale(1.1);box-shadow:0 8px 40px rgba(123,92,255,.65)}
.cb-play svg{width:26px;height:26px;margin-left:2px}
.cb-play.isplaying svg{margin-left:0}

/* Volume */
.vol-row{display:flex;align-items:center;gap:10px;max-width:200px;width:100%;flex-shrink:0}
.vol-ic svg{width:16px;height:16px;fill:var(--muted)}
.vol-sl{flex:1;height:3px;background:rgba(255,255,255,.12);border-radius:3px;-webkit-appearance:none;appearance:none;outline:none;cursor:pointer}
.vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:white;border-radius:50%;cursor:pointer;transition:.15s;box-shadow:0 0 0 0 rgba(123,92,255,.4)}
.vol-sl::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(123,92,255,.3)}

/* Topbar avatars */
.tb-avs{display:flex;flex-shrink:0;margin-left:auto}
.tb-av{width:28px;height:28px;border-radius:50%;border:2px solid rgba(10,10,15,.8);display:grid;place-items:center;font-size:11px;font-weight:700;margin-left:-7px;transition:transform .2s var(--ease)}
.tb-av:first-child{margin-left:0}
.tb-av:hover{transform:translateY(-3px);z-index:5}

/* ── FLOAT REACTIONS ── */
.float-layer{position:fixed;inset:0;pointer-events:none;z-index:999}
.frx{position:absolute;font-size:32px;animation:frxUp 2.8s var(--ease) forwards;will-change:transform,opacity;filter:drop-shadow(0 4px 12px rgba(0,0,0,.4))}
@keyframes frxUp{0%{opacity:0;transform:translateY(0) scale(.4) rotate(-10deg)}10%{opacity:1;transform:translateY(-15px) scale(1.2) rotate(5deg)}25%{transform:translateY(-40px) scale(1) rotate(-3deg)}90%{opacity:.7}100%{opacity:0;transform:translateY(-220px) scale(.6) rotate(8deg)}}

/* ── TOAST ── */
.toast-pile{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.tst{background:rgba(20,20,30,.95);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-full);padding:10px 20px;font-size:13px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);backdrop-filter:blur(16px);white-space:nowrap;animation:tstUp .3s var(--spring)}
.tst.ok{color:#4ade80;border-color:rgba(74,222,128,.25)}
.tst.err{color:#f87171;border-color:rgba(248,113,113,.25)}
@keyframes tstUp{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Hidden YT */
#yt-w{position:fixed;width:1px;height:1px;bottom:-200px;opacity:.01;pointer-events:none}

/* Responsive */
@media(max-width:680px){
  #room{flex-direction:column}
  .sidebar{width:100%;min-width:unset;height:52%;border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}
  .player{padding:16px;gap:14px}
  .vinyl-wrap{width:min(160px,38vw);height:min(160px,38vw)}
  .cb-play{width:54px;height:54px}
  .rx-bar{justify-content:center}
}
</style>
</head>
<body>

<div class="float-layer" id="float-layer"></div>
<div class="toast-pile" id="toasts"></div>
<div id="yt-w"><div id="yt-player"></div></div>

<!-- ════════════════════ LANDING ════════════════════ -->
<div class="screen" id="land">
  <div class="aurora">
    <div class="au au1"></div><div class="au au2"></div><div class="au au3"></div>
  </div>
  <div class="land-wrap">
    <div class="wordmark">
      <div class="wm-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm-1.5 5.8v8.4a.5.5 0 00.77.42l6-4.2a.5.5 0 000-.84l-6-4.2a.5.5 0 00-.77.42z"/></svg>
      </div>
      <div class="wm-name">Syngly</div>
      <div class="wm-tag">listen together · feel together</div>
    </div>
    <div class="lcard">
      <div class="ltabs">
        <button class="ltab on" onclick="ltab('c',this)">Create Room</button>
        <button class="ltab" onclick="ltab('j',this)">Join Room</button>
      </div>
      <div id="lp-c">
        <div class="fg"><label class="fl">Your Name</label><input class="fi" id="c-nm" placeholder="e.g. Arjun" maxlength="20"/></div>
        <div class="fg" style="margin-bottom:22px"><label class="fl">Room Name <span style="text-transform:none;letter-spacing:0;color:rgba(255,255,255,.25)">(optional)</span></label><input class="fi" id="c-rn" placeholder="e.g. Late Night Vibes"/></div>
        <button class="cta" onclick="createRoom()">
          <svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z" transform="scale(-1,1) translate(-24,0)"/></svg>
          Create &amp; Start Listening
        </button>
      </div>
      <div id="lp-j" style="display:none">
        <div class="fg"><label class="fl">Your Name</label><input class="fi" id="j-nm" placeholder="e.g. Priya" maxlength="20"/></div>
        <div class="fg" style="margin-bottom:22px"><label class="fl">Room Code</label><input class="fi code" id="j-cd" placeholder="XXXXXX" maxlength="6" oninput="this.value=this.value.toUpperCase()"/></div>
        <button class="cta" onclick="joinRoom()">
          <svg viewBox="0 0 24 24"><path d="M11 7l-5 5 5 5v-3h8v-4h-8V7zm9 11h-8v2h8a2 2 0 002-2V5a2 2 0 00-2-2h-8v2h8v14z"/></svg>
          Join Room
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════ ROOM ════════════════════ -->
<div class="screen off" id="room">
  <div class="room-bg" id="room-bg"></div>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-top">
        <button class="back-btn" onclick="leaveRoom()">
          <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="room-nm" id="r-nm">Room</div>
        <div class="code-chip" onclick="copyCode()">
          <div class="code-dot"></div>
          <span class="code-txt" id="r-code">------</span>
        </div>
      </div>
      <!-- Search -->
      <div class="search-box" id="s-box">
        <div class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22" stroke-width="2.5"/></svg></div>
        <input class="s-in" id="s-in" placeholder="Search songs…" autocomplete="off" oninput="onSInput(this.value)" onkeydown="if(event.key==='Enter')doSearch()"/>
        <div class="s-clr" onclick="clrSearch()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
      </div>
      <div class="s-results" id="s-res"></div>
    </div>

    <!-- Tabs -->
    <div class="stabs">
      <button class="stab on" onclick="stab('q',this)">Queue</button>
      <button class="stab" onclick="stab('c',this)">Chat</button>
      <button class="stab" onclick="stab('p',this)">People</button>
    </div>

    <!-- Queue -->
    <div class="spane on" id="sp-q">
      <div id="q-list">
        <div class="q-empty"><div class="q-empty-icon">🎵</div><p>Queue is empty.<br/>Search for songs above.</p></div>
      </div>
    </div>
    <!-- Chat -->
    <div class="spane" id="sp-c">
      <div class="chat-feed" id="chat-feed"></div>
      <div class="chat-bar">
        <input class="cin" id="chat-in" placeholder="Say something…" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="csend" onclick="sendChat()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
      </div>
    </div>
    <!-- People -->
    <div class="spane" id="sp-p">
      <div id="ppl-list"></div>
    </div>
  </div>

  <!-- Player -->
  <div class="player">
    <!-- Reactions -->
    <div class="rx-bar">
      <button class="rx-b" onclick="react('🔥')">🔥</button>
      <button class="rx-b" onclick="react('❤️')">❤️</button>
      <button class="rx-b" onclick="react('🎵')">🎵</button>
      <button class="rx-b" onclick="react('😭')">😭</button>
      <button class="rx-b" onclick="react('🤯')">🤯</button>
      <button class="rx-b" onclick="react('💃')">💃</button>
      <button class="rx-b" onclick="react('👏')">👏</button>
      <button class="rx-b" onclick="react('✨')">✨</button>
      <button class="rx-b" onclick="react('🎸')">🎸</button>
      <button class="rx-b" onclick="react('🥹')">🥹</button>
    </div>

    <!-- 3D Vinyl -->
    <div class="vinyl-stage">
      <div class="vinyl-wrap" id="vinyl">
        <div class="vinyl">
          <div class="vinyl-label" id="vinyl-label">
            <div class="vinyl-label-ph" id="vinyl-ph">
              <svg viewBox="0 0 24 24"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>
            </div>
          </div>
          <div class="vinyl-hole"></div>
        </div>
        <!-- Tonearm -->
        <div class="tonearm" id="tonearm">
          <svg viewBox="0 0 60 120" fill="none">
            <circle cx="52" cy="8" r="7" fill="rgba(255,255,255,.15)" stroke="rgba(255,255,255,.3)" stroke-width="1.5"/>
            <path d="M52 15 L52 70 Q52 85 35 95 L28 100" stroke="rgba(255,255,255,.4)" stroke-width="3" stroke-linecap="round" fill="none"/>
            <circle cx="28" cy="102" r="4" fill="rgba(123,92,255,.8)"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Track info -->
    <div class="track-block">
      <div class="t-title" id="t-title">Nothing playing yet</div>
      <div class="t-ch" id="t-ch">Search for a song to get started</div>
      <div class="t-badges" id="t-badges"></div>
    </div>

    <!-- Progress -->
    <div class="prog-area">
      <div class="prog-times"><span id="tc">0:00</span><span id="td">0:00</span></div>
      <div class="prog-rail" id="prog-rail" onclick="seek(event)">
        <div class="prog-bar" id="prog-bar" style="width:0%">
          <div class="prog-thumb"></div>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="ctrl-row">
      <button class="cb dim" id="b-prev" onclick="prevTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg>
      </button>
      <button class="cb cb-play" id="b-play" onclick="togglePlay()">
        <svg id="play-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="cb dim" id="b-next" onclick="nextTrack()">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="vol-row">
      <div class="vol-ic"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02z"/></svg></div>
      <input type="range" class="vol-sl" id="vol" min="0" max="100" value="80" oninput="setVol(+this.value)"/>
      <div class="vol-ic"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM18.5 12c0-3.53-2-6.58-5-8.1v2.2c2 1.29 3 3.44 3 5.9s-1 4.61-3 5.9v2.2c3-1.52 5-4.57 5-8.1z"/></svg></div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,get,update,push,remove,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB={apiKey:"AIzaSyCnmt6gkl5DfmFwY611TshCHUiViM7t-a4",authDomain:"syngly.firebaseapp.com",databaseURL:"https://syngly-default-rtdb.firebaseio.com",projectId:"syngly",storageBucket:"syngly.firebasestorage.app",messagingSenderId:"483492974972",appId:"1:483492974972:web:65d8e391f45ed007e2d4f9"};
const YTK="AIzaSyCaoR5MgYc9UGtxno46WorsUjqdOl5OEyw";
const db=getDatabase(initializeApp(FB));

/* ── STATE ── */
let S={uid:null,name:null,room:null,rname:null,host:false,queue:[],idx:-1,playing:false,dur:0,ct:0,members:{},vol:80,init:false};
let yt=null,ytOk=false,pending=null,progT=null,unsubs=[],sTimer=null,lastVid=null;

/* ── UTILS ── */
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmt=s=>{const n=Math.floor(s||0);return`${Math.floor(n/60)}:${(n%60).toString().padStart(2,'0')}`;};
const uid=()=>'u'+Math.random().toString(36).substr(2,9);
const rndCode=()=>Math.random().toString(36).substr(2,6).toUpperCase();
const COLS=['#7B5CFF','#FF5CAA','#00E5CC','#FFD166','#FF6B35','#06D6A0'];
const col=i=>COLS[i%COLS.length];
function toast(m,t=''){const w=$('toasts'),e=document.createElement('div');e.className='tst '+t;e.textContent=m;w.appendChild(e);setTimeout(()=>e.remove(),3200);}
function decode(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||s;}

/* ── THEME persistence ── */
(()=>{const t=localStorage.getItem('sy-th')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();

/* ── LANDING TABS ── */
window.ltab=(t,b)=>{document.querySelectorAll('.ltab').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('lp-c').style.display=t==='c'?'block':'none';$('lp-j').style.display=t==='j'?'block':'none';};

/* ── SIDEBAR TABS ── */
window.stab=(t,b)=>{document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));b.classList.add('on');['q','c','p'].forEach(x=>{$(`sp-${x}`).classList.toggle('on',x===t);});if(t==='c')setTimeout(()=>{const f=$('chat-feed');f.scrollTop=f.scrollHeight;},50);};

/* ── CREATE ROOM ── */
window.createRoom=async()=>{
  const name=$('c-nm').value.trim();const rname=$('c-rn').value.trim();
  if(!name){toast('Enter your name!','err');return;}
  S.uid=uid();S.name=name;S.room=rndCode();S.rname=rname||`${name}'s Room`;S.host=true;
  await set(ref(db,`rooms/${S.room}`),{name:S.rname,host:S.uid,at:Date.now(),playback:{playing:false,ct:0,idx:-1,vid:'',at:Date.now()},queue:'[]'});
  await set(ref(db,`rooms/${S.room}/members/${S.uid}`),{name:S.name,at:Date.now()});
  enterRoom();toast(`Room created! Code: ${S.room} 🎉`,'ok');
};

/* ── JOIN ROOM ── */
window.joinRoom=async()=>{
  const name=$('j-nm').value.trim();const code=$('j-cd').value.trim().toUpperCase();
  if(!name){toast('Enter your name!','err');return;}
  if(code.length!==6){toast('Room code must be 6 characters','err');return;}
  try{
    const snap=await get(ref(db,`rooms/${code}`));
    if(!snap.exists()){toast('Room not found! Check the code.','err');return;}
    const r=snap.val();
    S.uid=uid();S.name=name;S.room=code;S.rname=r.name;S.host=false;
    await set(ref(db,`rooms/${code}/members/${S.uid}`),{name,at:Date.now()});
    enterRoom();toast(`Joined ${r.name}! 🎵`,'ok');
  }catch(e){console.error(e);toast('Join failed — check Firebase rules','err');}
};

/* ── ENTER ROOM ── */
function enterRoom(){
  $('land').classList.add('off');$('room').classList.remove('off');
  $('r-nm').textContent=S.rname;$('r-code').textContent=S.room;
  updateBadges();subscribeAll();
  window.addEventListener('beforeunload',cleanup);
}

/* ── LEAVE ── */
window.leaveRoom=async()=>{
  cleanup();$('room').classList.add('off');$('land').classList.remove('off');
  S={uid:null,name:null,room:null,rname:null,host:false,queue:[],idx:-1,playing:false,dur:0,ct:0,members:{},vol:80,init:false};
  lastVid=null;
  $('q-list').innerHTML='<div class="q-empty"><div class="q-empty-icon">🎵</div><p>Queue is empty.<br/>Search for songs above.</p></div>';
  $('chat-feed').innerHTML='';$('t-title').textContent='Nothing playing yet';$('t-ch').textContent='Search for a song to get started';
  $('vinyl').classList.remove('playing');$('tonearm').classList.remove('playing');
  $('prog-bar').style.width='0%';$('tc').textContent='0:00';$('td').textContent='0:00';
};

async function cleanup(){
  unsubs.forEach(u=>u&&u());unsubs=[];stopProg();
  if(yt&&ytOk)try{yt.stopVideo();}catch(e){}
  if(S.room&&S.uid)try{await remove(ref(db,`rooms/${S.room}/members/${S.uid}`));}catch(e){}
}

/* ── SUBSCRIBE ── */
function subscribeAll(){
  // Room (queue + playback together)
  unsubs.push(onValue(ref(db,`rooms/${S.room}`),snap=>{
    if(!snap.exists())return;
    const d=snap.val();
    // Queue
    try{S.queue=JSON.parse(d.queue||'[]');}catch(e){S.queue=[];}
    renderQueue();
    // Playback
    if(d.playback)handlePB(d.playback);
  }));
  // Members
  unsubs.push(onValue(ref(db,`rooms/${S.room}/members`),snap=>{
    S.members=snap.val()||{};renderMembers();renderAvatars();
  }));
  // Chat
  unsubs.push(onValue(ref(db,`rooms/${S.room}/chat`),snap=>{
    const msgs=snap.val()?Object.values(snap.val()).sort((a,b)=>a.at-b.at):[];
    renderChat(msgs);
  }));
  // Reactions
  unsubs.push(onValue(ref(db,`rooms/${S.room}/reactions`),snap=>{
    if(!snap.val())return;
    Object.values(snap.val()).forEach(r=>{
      if(Date.now()-r.at<3500&&r.by!==S.uid)floatEmoji(r.emoji);
    });
  }));
}

/* ── PLAYBACK HANDLER ── */
function handlePB(p){
  const changed=p.idx!==S.idx;
  S.idx=p.idx??-1;S.playing=p.playing;
  // Update controls
  $('b-prev').classList.toggle('dim',!S.host||S.idx<=0);
  $('b-next').classList.toggle('dim',!S.host||S.idx>=S.queue.length-1);
  updateNP();updatePlayBtn();
  if(!ytOk){pending={p,changed};return;}
  applyPB(p,changed);
}

function applyPB(p,changed){
  const track=S.queue[S.idx];if(!track)return;
  const elapsed=(Date.now()-p.at)/1000;
  const syncT=p.playing?p.ct+elapsed:p.ct;
  if(S.host){
    if(changed&&track.vid!==lastVid){lastVid=track.vid;yt.loadVideoById({videoId:track.vid,startSeconds:0});if(!p.playing)setTimeout(()=>{try{yt.pauseVideo();}catch(e){}},1200);}
    return;
  }
  // Listener
  if(!S.init||changed){
    S.init=true;lastVid=track.vid;
    if(p.playing){yt.loadVideoById({videoId:track.vid,startSeconds:Math.max(0,syncT)});}
    else{yt.loadVideoById({videoId:track.vid,startSeconds:Math.max(0,p.ct)});setTimeout(()=>{try{yt.pauseVideo();}catch(e){}},1500);}
  }else{
    const cur=yt.getCurrentTime()||0;
    if(Math.abs(cur-syncT)>2.5)yt.seekTo(Math.max(0,syncT),true);
    if(p.playing&&yt.getPlayerState()!==YT.PlayerState.PLAYING)yt.playVideo();
    if(!p.playing&&yt.getPlayerState()===YT.PlayerState.PLAYING)yt.pauseVideo();
  }
}

/* ── YOUTUBE ── */
window.onYouTubeIframeAPIReady=()=>{
  yt=new YT.Player('yt-player',{height:'1',width:'1',playerVars:{autoplay:0,controls:0,playsinline:1,rel:0},events:{
    onReady:()=>{ytOk=true;yt.setVolume(S.vol);if(pending){applyPB(pending.p,pending.changed);pending=null;}},
    onStateChange:onYTS
  }});
};

function onYTS(e){
  const PS=YT.PlayerState;
  if(e.data===PS.PLAYING){
    S.dur=yt.getDuration();$('td').textContent=fmt(S.dur);
    $('vinyl').classList.add('playing');$('tonearm').classList.add('playing');
    startProg();if(S.host){S.playing=true;updatePlayBtn();pushPB();}
  }
  if(e.data===PS.PAUSED){
    $('vinyl').classList.remove('playing');$('tonearm').classList.remove('playing');
    stopProg();if(S.host){S.playing=false;updatePlayBtn();pushPB();}
  }
  if(e.data===PS.ENDED){
    $('vinyl').classList.remove('playing');$('tonearm').classList.remove('playing');
    stopProg();if(S.host)nextTrack();
  }
}

function startProg(){stopProg();progT=setInterval(()=>{if(!yt||!ytOk)return;S.ct=yt.getCurrentTime();const p=S.dur>0?(S.ct/S.dur)*100:0;$('prog-bar').style.width=Math.min(p,100)+'%';$('tc').textContent=fmt(S.ct);},500);}
function stopProg(){clearInterval(progT);}

async function pushPB(){
  if(!S.host||!S.room)return;
  const track=S.queue[S.idx];
  await update(ref(db,`rooms/${S.room}/playback`),{playing:S.playing,ct:yt?yt.getCurrentTime():0,idx:S.idx,vid:track?.vid||'',at:Date.now()});
}

/* ── CONTROLS ── */
window.togglePlay=()=>{
  if(!S.host){toast('Only the host controls playback','err');return;}
  if(!yt||!ytOk)return;
  if(S.idx<0&&S.queue.length>0){loadTrack(0);return;}
  S.playing?yt.pauseVideo():yt.playVideo();
};

function loadTrack(i){
  if(!S.host||!yt||!ytOk||i<0||i>=S.queue.length)return;
  lastVid=S.queue[i].vid;
  yt.loadVideoById(S.queue[i].vid);
  S.playing=true;updatePlayBtn();
}

window.prevTrack=()=>{if(!S.host||S.idx<=0)return;loadTrack(S.idx-1);};
window.nextTrack=()=>{if(!S.host||S.idx>=S.queue.length-1)return;loadTrack(S.idx+1);};
window.playAt=i=>{if(!S.host){toast('Only host can change track','err');return;}loadTrack(i);};
window.seek=e=>{if(!S.host||!yt||!ytOk||!S.dur)return;const r=$('prog-rail');yt.seekTo(Math.max(0,((e.clientX-r.getBoundingClientRect().left)/r.offsetWidth)*S.dur),true);pushPB();};
window.setVol=v=>{S.vol=v;if(yt&&ytOk)yt.setVolume(v);};

function updatePlayBtn(){
  const svg=$('play-svg'),btn=$('b-play');
  if(S.playing){svg.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';btn.classList.add('isplaying');}
  else{svg.innerHTML='<path d="M8 5v14l11-7z"/>';btn.classList.remove('isplaying');btn.style.marginLeft='';}
}

/* ── SEARCH ── */
window.onSInput=v=>{$('s-box').classList.toggle('has-q',v.length>0);clearTimeout(sTimer);if(!v.trim()){closeS();return;}sTimer=setTimeout(()=>doSearch(v),450);};
window.doSearch=async(q)=>{
  if(!q)q=$('s-in').value.trim();if(!q)return;
  const res=$('s-res');res.classList.add('open');
  res.innerHTML='<div class="s-spin"><div class="spinner"></div></div>';
  try{
    const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=8&key=${YTK}`);
    const d=await r.json();
    if(d.error){res.innerHTML=`<div class="s-empty">API error: ${d.error.message}</div>`;return;}
    if(!d.items?.length){res.innerHTML='<div class="s-empty">No results</div>';return;}
    res.innerHTML=d.items.map((item,i)=>{
      const vid=item.id.videoId;
      const title=decode(item.snippet.title);
      const ch=decode(item.snippet.channelTitle);
      const thumb=item.snippet.thumbnails?.medium?.url||item.snippet.thumbnails?.default?.url||'';
      const ts=JSON.stringify({vid,title,ch,thumb}).replace(/'/g,"\\'");
      return`<div class="sr" style="animation-delay:${i*.04}s" onclick='addSong(${ts})'>
        ${thumb?`<img class="sr-img" src="${thumb}" loading="lazy" alt=""/>`:'<div class="sr-img"></div>'}
        <div class="sr-info"><div class="sr-t">${esc(title)}</div><div class="sr-c">${esc(ch)}</div></div>
        <div class="sr-add"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></div>
      </div>`;
    }).join('');
  }catch(e){console.error(e);res.innerHTML='<div class="s-empty">Search failed</div>';}
};
function closeS(){$('s-res').classList.remove('open');}
window.clrSearch=()=>{$('s-in').value='';$('s-box').classList.remove('has-q');closeS();};

window.addSong=async({vid,title,ch,thumb})=>{
  const song={vid,title,ch,thumb,by:S.name,at:Date.now()};
  const nq=[...S.queue,song];
  await update(ref(db,`rooms/${S.room}`),{queue:JSON.stringify(nq)});
  if(S.idx<0)await update(ref(db,`rooms/${S.room}/playback`),{idx:0,playing:false,ct:0,vid,at:Date.now()});
  window.clrSearch();
  document.querySelectorAll('.stab')[0].click();
  toast(`Added: ${title.substring(0,35)}…`,'ok');
};

/* ── CHAT ── */
window.sendChat=async()=>{
  const inp=$('chat-in'),txt=inp.value.trim();if(!txt)return;
  await push(ref(db,`rooms/${S.room}/chat`),{text:txt,name:S.name,uid:S.uid,at:Date.now()});
  inp.value='';
};
function renderChat(msgs){
  const c=$('chat-feed');
  const atBot=c.scrollHeight-c.scrollTop-c.clientHeight<60;
  c.innerHTML=msgs.map(m=>{
    if(m.system)return`<div class="sys-msg">• ${esc(m.text)}</div>`;
    const me=m.uid===S.uid;
    const t=new Date(m.at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    return`<div class="cmsg${me?' me':''}"><div class="cm-meta"><span class="cm-name${me?' me':''}">${esc(m.name)}</span><span class="cm-time">${t}</span></div><div class="cm-bubble">${esc(m.text)}</div></div>`;
  }).join('');
  if(atBot)c.scrollTop=c.scrollHeight;
}

/* ── REACTIONS ── */
window.react=async emoji=>{
  floatEmoji(emoji);
  await push(ref(db,`rooms/${S.room}/reactions`),{emoji,by:S.uid,at:Date.now()});
};
function floatEmoji(e){
  const l=$('float-layer'),el=document.createElement('div');
  el.className='frx';el.textContent=e;
  el.style.left=(10+Math.random()*80)+'%';el.style.bottom='120px';
  l.appendChild(el);setTimeout(()=>el.remove(),2900);
}

/* ── RENDER ── */
function renderQueue(){
  const l=$('q-list');
  if(!S.queue.length){l.innerHTML='<div class="q-empty"><div class="q-empty-icon">🎵</div><p>Queue is empty.<br/>Search for songs above.</p></div>';return;}
  l.innerHTML=S.queue.map((t,i)=>`
    <div class="qi${i===S.idx?' now':''}" onclick="playAt(${i})" style="animation-delay:${i*.03}s">
      ${t.thumb?`<img class="qi-thumb" src="${t.thumb}" loading="lazy" alt=""/>`:'<div class="qi-thumb"></div>'}
      <div class="qi-info"><div class="qi-t">${esc(t.title)}</div><div class="qi-c">${esc(t.ch)} · ${esc(t.by||'')}</div></div>
      ${i===S.idx&&S.playing?'<div class="eq"><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div></div>':''}
    </div>`).join('');
}

function updateNP(){
  const track=S.queue[S.idx];if(!track)return;
  $('t-title').textContent=track.title;$('t-ch').textContent=track.ch;
  // Vinyl label art
  const lbl=$('vinyl-label');
  if(track.thumb){lbl.innerHTML=`<img src="${track.thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
  }
  // Room BG ambient
  if(track.thumb)$('room-bg').style.background=`radial-gradient(ellipse at 30% 40%,rgba(123,92,255,.25),transparent 60%), radial-gradient(ellipse at 70% 60%,rgba(255,92,170,.2),transparent 55%), #0A0A0F`;
}

function updateBadges(){
  $('t-badges').innerHTML=S.host
    ?`<span class="badge b-host">👑 Host</span><span class="badge b-sync">● Live</span>`
    :`<span class="badge b-listen">🎧 Listener</span><span class="badge b-sync">● Synced</span>`;
}

function renderMembers(){
  $('ppl-list').innerHTML=Object.entries(S.members).map(([id,m],i)=>
    `<div class="ppl-row"><div class="ppl-av" style="background:${col(i)}">${m.name[0].toUpperCase()}</div><div class="ppl-nm">${esc(m.name)}</div>${i===0?'<div class="ppl-host">👑 Host</div>':''}</div>`
  ).join('');
}

function renderAvatars(){
  const tb=document.querySelector('.tb-avs');if(!tb)return;
  tb.innerHTML=Object.entries(S.members).slice(0,5).map(([id,m],i)=>
    `<div class="tb-av" style="background:${col(i)}" title="${esc(m.name)}">${m.name[0].toUpperCase()}</div>`
  ).join('');
}

window.copyCode=()=>navigator.clipboard.writeText(S.room).then(()=>toast(`${S.room} copied! Share with friends 📋`,'ok')).catch(()=>prompt('Room code:',S.room));

/* expose globals already done via window.X = above */
</script>
